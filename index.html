<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Grids for Desktop</title>
   <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js">
  </script>
</head>

<body>
	<div class="container-fluid">
		<h1>Desktop Grid Magic</h1>
		<p>These columns respond at the large (lg) breakpoint.</p>
		<p>Resize the browser window to see the effect.</p>
		<div class="row">
			<div class="col-lg-4" style="background-color:orange;">
				Sidebar
			</div>
			<div class="col-lg-8" style="background-color:lightblue;">
				Main Content
			</div>
		</div>
		<div class="row">
			<div class="col-lg-3" style="background-color:lightgreen;">
				Nav
			</div>
			<div class="col-lg-6" style="background-color:lightyellow;">
				Article
			</div>
			<div class="col-lg-3" style="background-color:lightsalmon;">
				Aside
			</div>
		</div>
	</div>
</body>

</html>
